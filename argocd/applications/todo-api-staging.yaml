apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-api-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/projets-sdv/gitops-team-eiffage.git
    targetRevision: main
    path: apps/todo-api/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: todo-api-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf-runner
  namespace: infra-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tf-runner-cluster-role
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - configmaps
      - serviceaccounts
      - resourcequotas
      - limitranges
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tf-runner-cluster-rolebinding
subjects:
  - kind: ServiceAccount
    name: tf-runner
    namespace: infra-system
roleRef:
  kind: ClusterRole
  name: tf-runner-cluster-role
  apiGroup: rbac.authorization.k8s.io

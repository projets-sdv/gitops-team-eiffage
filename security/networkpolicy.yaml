apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: todo-api-network-policy
  namespace: todo-api-dev
spec:
  podSelector:
    matchLabels:
      app: todo-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000

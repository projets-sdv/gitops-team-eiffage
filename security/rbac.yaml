apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-api-sa
  namespace: todo-api-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todo-api-readonly
  namespace: todo-api-dev
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todo-api-readonly-binding
  namespace: todo-api-dev
subjects:
  - kind: ServiceAccount
    name: todo-api-sa
    namespace: todo-api-dev
roleRef:
  kind: Role
  name: todo-api-readonly
  apiGroup: rbac.authorization.k8s.io
